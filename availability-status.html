    <div class="wrapper">
<h1>
            Enter Your Details Below to Know Latest Availability Status of our 1 BHK House Near Acharya College
        </h1>


        <div class="form-area">

            <form action="https://subscribe.pkarun.com/gateway.php" method="POST" id="anti-spam-form" novalidate>

                <div class="input-wrapper">

                    <div class="input-icon">
                        👤
                    </div>

                    <input type="text" name="name" id="name" class="form-input"
                        placeholder="Enter your name" autocomplete="name"
                        spellcheck="false" required>

                </div>

                <div class="input-wrapper">

                    <div class="input-icon">
                        ✉
                    </div>

                    <input type="email" name="email" id="email" class="form-input"
                        placeholder="Enter your email address" inputmode="email" autocomplete="email"
                        autocapitalize="off" spellcheck="false" required>

                </div>

                <div id="email-suggestions" class="email-suggestions"></div>

                <div id="email-hint" class="email-hint"></div>

                <div style="display:none;">

                    <input type="text" name="hp" id="hp_sendy_native" tabindex="-1" autocomplete="off" value="">

                    <input type="text" name="alt_phone_field" id="hp_phone" tabindex="-1" autocomplete="off">

                    <input type="text" name="user_zipcode" id="hp_zip" tabindex="-1" autocomplete="off">

                </div>

                <input type="hidden" name="list_id" value="1bhkhouse-home-page-leads">

                <input type="hidden" name="redirect"
                    value="https://1bhkhouse.com/owner-contact-details/">

                <input type="hidden" name="ts" id="form_timestamp" value="">



                <button type="submit" name="submit" id="submit" class="btn-submit">

                    Send Vacancy Update >>

                </button>
                <br><br>
                                <div class="consent-notice">
                    By requesting status you will also be added to vacancy update email list. You can unsubscribe at anytime.

    <script>

        document.addEventListener("DOMContentLoaded", function () {

            const form = document.getElementById("anti-spam-form");
            const nameInput = document.getElementById("name");
            const emailInput = document.getElementById("email");
            const submitBtn = document.getElementById("submit");

            // 💎 AUTOMATICALLY POPULATE GATEWAY ANTI-SPAM KEY ON LOAD
            const tsField = document.getElementById("form_timestamp");
            if (tsField) {
                tsField.value = Math.floor(Date.now() / 1000);
            }

            // =========================
            // FORM VALIDATION
            // =========================

            form.addEventListener("submit", function (e) {

                nameInput.classList.remove("error");
                emailInput.classList.remove("error");

                const nameValue = nameInput.value.trim();
                const emailValue = emailInput.value.trim();
                let hasError = false;

                // Validate Name field
                if (nameValue === "") {
                    nameInput.classList.add("error");
                    if (!hasError) {
                        nameInput.focus();
                        hasError = true;
                    }
                }

                // Validate Email field (Empty or Invalid format)
                if (emailValue === "" || !emailInput.validity.valid) {
                    emailInput.classList.add("error");
                    if (!hasError) {
                        emailInput.focus();
                        hasError = true;
                    }
                }

                // Block submission if there's an error
                if (hasError) {
                    e.preventDefault();
                    return false;
                }

                // Loading state
                submitBtn.innerHTML = "Submitting...";
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.7";
            });

            // Remove error states while typing
            nameInput.addEventListener("input", function () {
                nameInput.classList.remove("error");
            });

            emailInput.addEventListener("input", function () {
                emailInput.classList.remove("error");
            });

            // =========================
            // EMAIL SUGGESTIONS
            // =========================

            const hintDiv = document.getElementById("email-hint");
            const suggestionBox = document.getElementById("email-suggestions");

            const emailDomains = [
                'gmail.com',
                'yahoo.com',
                'hotmail.com',
                'outlook.com',
                'icloud.com',
                'protonmail.com'
            ];

            const commonTypos = {
                'gamil': 'gmail',
                'gmai': 'gmail',
                'gmal': 'gmail',
                'gmil': 'gmail',
                'gmial': 'gmail',
                'gmaill': 'gmail',
                'gnail': 'gmail',
                'yaho': 'yahoo',
                'yhoo': 'yahoo',
                'yahho': 'yahoo',
                'hotmali': 'hotmail',
                'hotmil': 'hotmail',
                'hotmal': 'hotmail',
                'outlok': 'outlook',
                'otlook': 'outlook',
                'iclod': 'icloud'
            };

            const tldTypos = {
                'con': 'com',
                'cmo': 'com',
                'cm': 'com',
                'comm': 'com',
                'ocm': 'com'
            };

            let currentSuggestions = [];

            function isCompleteEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            emailInput.addEventListener("input", function () {

                const value = emailInput.value.trim().toLowerCase();

                suggestionBox.innerHTML = '';
                suggestionBox.style.display = 'none';
                hintDiv.style.display = "none";

                currentSuggestions = [];

                if (!value.includes("@")) return;

                const parts = value.split("@");

                const username = parts[0];
                const domainTyped = parts[1];

                if (!domainTyped) return;

                let domainParts = domainTyped.split(".");
                let domainName = domainParts[0];
                let tld = domainParts[1] || "";

                let changed = false;

                if (commonTypos[domainName]) {
                    domainName = commonTypos[domainName];
                    changed = true;
                }

                if (tld && tldTypos[tld]) {
                    tld = tldTypos[tld];
                    changed = true;
                }

                // Typo Suggestion

                if (changed) {

                    const suggestedEmail =
                        username + "@" + domainName + "." + (tld || "com");

                    hintDiv.innerHTML =
                        `Did you mean <span style="text-decoration:underline;color:#3399cc;">${suggestedEmail}</span>?`;

                    hintDiv.style.display = "block";

                    hintDiv.onclick = function () {

                        emailInput.value = suggestedEmail;

                        hintDiv.style.display = "none";
                        suggestionBox.style.display = "none";

                        emailInput.focus();
                    };
                }

                // Stop if complete email

                if (isCompleteEmail(value) || domainTyped.includes(".")) {
                    return;
                }

                const matchedDomains = emailDomains.filter(domain =>
                    domain.startsWith(domainTyped)
                );

                currentSuggestions = matchedDomains;

                if (matchedDomains.length === 0) return;

                suggestionBox.style.display = 'block';

                matchedDomains.forEach(domain => {

                    const item = document.createElement("div");

                    item.className = "email-suggestion-item";

                    item.textContent = domain;

                    item.addEventListener("mousedown", function (e) {

                        e.preventDefault();

                        emailInput.value = username + '@' + domain;

                        suggestionBox.style.display = 'none';
                        hintDiv.style.display = "none";

                        emailInput.focus();

                    });

                    suggestionBox.appendChild(item);

                });

            });

            // =========================
            // TAB AUTO SELECT
            // =========================

            emailInput.addEventListener("keydown", function (e) {

                if (e.key === "Tab" && currentSuggestions.length === 1) {

                    const value = emailInput.value.trim().toLowerCase();

                    if (!value.includes("@")) return;

                    e.preventDefault();

                    const username = value.split("@")[0];

                    emailInput.value =
                        username + "@" + currentSuggestions[0];

                    suggestionBox.style.display = 'none';
                    hintDiv.style.display = 'none';
                }

            });

        });

    </script>
